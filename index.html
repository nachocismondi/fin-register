<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Acceso privado</title>
  <style>
    :root {
      --bg: #f4f5f7; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --accent: #10b981; --accent-dark: #059669; --danger: #ef4444;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 24px;
    }
    .lock { width: 100%; max-width: 320px; text-align: center; user-select: none; }
    .ico { font-size: 2.6rem; margin-bottom: 8px; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; letter-spacing: -.01em; }
    .sub { color: var(--muted); font-size: .92rem; margin: 0 0 22px; }

    .dots { display: flex; justify-content: center; gap: 14px; height: 18px; margin-bottom: 8px; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #cbd5e1; background: transparent; transition: all .12s ease;
    }
    .dot.filled { background: var(--accent); border-color: var(--accent); }

    .msg { min-height: 22px; font-size: .88rem; font-weight: 600; margin: 4px 0 18px; color: var(--muted); }
    .msg.error { color: var(--danger); }

    .pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 280px; margin: 0 auto; }
    .key {
      height: 68px; border: none; border-radius: 18px;
      background: var(--card); color: var(--text);
      font-size: 1.6rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 6px 16px rgba(15,23,42,.05);
      transition: transform .05s ease, background .12s ease;
    }
    .key:active { transform: translateY(1px); background: #eef2f6; }
    .key.ghost { background: transparent; box-shadow: none; cursor: default; }
    .key.action { font-size: 1.5rem; color: var(--muted); background: transparent; box-shadow: none; }
    .key.action:active { background: #e2e8f0; }
    .key[disabled] { opacity: .5; cursor: default; }

    .shake { animation: shake .4s; }
    @keyframes shake {
      10%,90% { transform: translateX(-2px); }
      20%,80% { transform: translateX(4px); }
      30%,50%,70% { transform: translateX(-8px); }
      40%,60% { transform: translateX(8px); }
    }
    .spin {
      display: inline-block; width: 15px; height: 15px; vertical-align: -3px;
      border: 2px solid #cbd5e1; border-top-color: var(--accent);
      border-radius: 50%; animation: rot .7s linear infinite; margin-right: 6px;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
  </style>
</head>

      var PIN_LEN = 4;

      var dotsEl = document.getElementById("dots");
      var msgEl = document.getElementById("msg");
      var lockEl = document.getElementById("lock");
      var padEl = document.getElementById("pad");

      var entered = "";
      var busy = false;

      for (var i = 0; i < PIN_LEN; i++) {
        var dot = document.createElement("div");
        dot.className = "dot";
        dotsEl.appendChild(dot);
      }
      var dots = dotsEl.children;

      // Web Crypto requiere contexto seguro (https o localhost)
      if (!window.crypto || !crypto.subtle) {
        setMsg("Abrí esta página por HTTPS para poder desbloquear.", true);
        return;
      }

      function setMsg(text, isError) {
        msgEl.innerHTML = text;
        msgEl.classList.toggle("error", !!isError);
      }
      function renderDots() {
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.toggle("filled", i < entered.length);
        }
      }
      function b64ToBytes(b64) {
        return Uint8Array.from(atob(b64), function (c) { return c.charCodeAt(0); });
      }
      function press(d) {
        if (busy || entered.length >= PIN_LEN) return;
        setMsg("", false);
        entered += d;
        renderDots();
        if (entered.length === PIN_LEN) tryUnlock();
      }
      function del() {
        if (busy) return;
        setMsg("", false);
        entered = entered.slice(0, -1);
        renderDots();
      }
      function fail() {
        entered = "";
        renderDots();
        setMsg("PIN incorrecto", true);
        lockEl.classList.remove("shake");
        void lockEl.offsetWidth;
        lockEl.classList.add("shake");
      }

      async function tryUnlock() {
        busy = true;
        setMsg('<span class="spin"></span>Desbloqueando…', false);
        try {
          var enc = new TextEncoder();
          var baseKey = await crypto.subtle.importKey(
            "raw", enc.encode(entered), "PBKDF2", false, ["deriveKey"]
          );
          var key = await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: b64ToBytes(PAYLOAD.salt), iterations: PAYLOAD.iterations, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["decrypt"]
          );
          var ptBuf = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: b64ToBytes(PAYLOAD.iv) },
            key,
            b64ToBytes(PAYLOAD.ct)
          );
          var html = new TextDecoder().decode(ptBuf);
          // PIN correcto: reemplazamos el documento por la app desencriptada
          document.open();
          document.write(html);
          document.close();
        } catch (e) {
          busy = false;
          fail();
        }
      }

      padEl.addEventListener("click", function (ev) {
        var btn = ev.target.closest("button");
        if (!btn || btn.disabled) return;
        if (btn.dataset.d != null) press(btn.dataset.d);
        else if (btn.dataset.action === "del") del();
      });

      // Teclado físico (escritorio)
      window.addEventListener("keydown", function (ev) {
        if (ev.key >= "0" && ev.key <= "9") press(ev.key);
        else if (ev.key === "Backspace") del();
      });

      renderDots();
    })();
  </script>
